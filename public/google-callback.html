<!DOCTYPE html>
<html>
<head>
  <title>Connecting to Google…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #0f1117;
      color: #c4c9d4;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      color: #ef4444;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p id="status">Connecting to Google…</p>
    <p id="error" class="error" style="display:none;"></p>
  </div>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      if (error) {
        document.getElementById('status').textContent = 'Connection failed';
        document.getElementById('error').textContent = error;
        document.getElementById('error').style.display = 'block';
        return;
      }

      if (code && window.opener) {
        window.opener.postMessage({ type: 'google-oauth-callback', code: code }, '*');
        document.getElementById('status').textContent = 'Connected! This window will close…';
        setTimeout(() => window.close(), 1500);
      } else if (code) {
        document.getElementById('status').textContent = 'Connected! You can close this window.';
      } else {
        document.getElementById('status').textContent = 'No authorization code received.';
        document.getElementById('error').textContent = 'Please try connecting again from Settings.';
        document.getElementById('error').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
